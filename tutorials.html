<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شروحات 🌸</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Cairo',sans-serif;
background:#fff0f8 url("cute-bg.png") center/cover no-repeat;
margin:0;
padding:30px;
text-align:center;
overflow-x:hidden;
}

h1{
color:#ff69b4;
font-size:60px;
text-shadow:2px 2px #fff;
margin-bottom:40px;
}

.book{
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
position:relative;
}

/* القلوب المتطايرة */
.heart{
position:fixed;
font-size:24px;
animation:float 4s linear;
pointer-events:none;
}

@keyframes float{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-600px);opacity:0;}
}

/* البطاقات */
.card{
background:#ffb6c1;
border:4px solid #ff69b4;
border-radius:25px;
padding:20px;
width:350px;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
cursor:pointer;
transition:0.3s;
position:relative;
}

.card.locked{
opacity:0.6;
cursor:not-allowed;
}

.card:hover:not(.locked){
transform:scale(1.05);
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

/* العناوين */
h2{
color:#8a2be2;
font-size:36px;
margin:0;
}

p{
color:#000;
font-weight:900;
font-size:18px;
margin:10px 0;
}

.toggle-content{
display:none;
text-align:left;
margin-top:10px;
}

/* أزرار • */
.btn-symbol{
display:inline-block;
background:#ff69b4;
color:white;
padding:5px 12px;
border-radius:12px;
margin:3px;
cursor:pointer;
transition:0.2s;
font-weight:bold;
}

.btn-symbol:active{
background:#00ff00;
transform:scale(1.2);
}

/* التعليقات أفقية */
.comment-section{
display:flex;
gap:10px;
margin-top:10px;
justify-content:flex-start;
flex-wrap:wrap;
}

.comment{
background:#ffe4e1;
padding:5px 10px;
border-radius:10px;
font-weight:bold;
white-space: nowrap;
}
</style>
</head>

<body>

<h1>شروحات 🌸</h1>

<div class="book">

<!-- بطاقة مفتوحة -->
<div class="card" onclick="toggleContent(this)">
<h2>∆ مقدمة المودات</h2>
<div class="toggle-content">
<p>° هذه المذكرة تحتوي على شرح كيفية تركيب المودات.</p>
<div>
<span class="btn-symbol">•</span>
<span class="btn-symbol">•</span>
</div>
<div class="comment-section" data-limit="2">
<div class="comment"><strong>Rysa:</strong> تعليق 1</div>
<div class="comment"><strong>Rysa:</strong> تعليق 2</div>
</div>
</div>
</div>

<!-- بطاقة مغلقة -->
<div class="card locked">
<h2>∆ مود الديناصورات</h2>
<p>🔒 مغلق</p>
</div>

<!-- بطاقة مفتوحة -->
<div class="card" onclick="toggleContent(this)">
<h2>∆ شرح تركيب مود السحر</h2>
<div class="toggle-content">
<p>° خطوات التثبيت بالتفصيل...</p>
<div>
<span class="btn-symbol">•</span>
<span class="btn-symbol">•</span>
</div>
<div class="comment-section" data-limit="2">
<div class="comment"><strong>Rysa:</strong> تعليق 1</div>
<div class="comment"><strong>Rysa:</strong> تعليق 2</div>
</div>
</div>
</div>

</div>

<script>
// فتح وغلق محتوى البطاقة فقط إذا غير مقفلة
function toggleContent(card){
if(card.classList.contains("locked")) return;
const content = card.querySelector(".toggle-content");
content.style.display = (content.style.display==="block") ? "none" : "block";
}

// قلوب صغيرة متطايرة
setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💗";
heart.style.left=Math.random()*100+"%";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),4000);
},800);
</script>

</body>
</html>
