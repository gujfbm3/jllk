<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Rysa References</title>

<style>

body{
background:url("cute-bg.png") center/cover no-repeat;
font-family:Arial;
text-align:center;
margin:0;
padding:30px;
}

h1{
font-size:65px;
color:#ff4fa3;
text-shadow:2px 2px white;
}

.subtitle{
font-size:22px;
color:#444;
margin-bottom:30px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.card{
background:white;
border:4px solid #ff69b4;
border-radius:25px;
width:300px;
padding:15px;
box-shadow:0 6px 10px rgba(0,0,0,0.15);
}

.card img{
width:100%;
border-radius:15px;
}

.card h2{
font-size:28px;
color:#ff2a8a;
}

.card a{
display:block;
margin-top:10px;
font-size:20px;
color:white;
background:#ff69b4;
padding:8px;
border-radius:10px;
text-decoration:none;
}

.card a:hover{
background:#ff2a8a;
}

</style>
</head>

<body>

<h1>References 🎀</h1>

<p class="subtitle">
الفيديوهات والمصادر التي أستخدمها في الشروحات 💗
</p>

<div class="container">

<div class="card">
<img src="ref1.png">

<a href="ضع رابط الفيديو هنا" target="_blank">🎥 مشاهدة</a>
</div>

<div class="card">

<a href="ضع رابط الفيديو هنا" target="_blank">🎥 مشاهدة</a>
</div>

<div class="card">
<img src="ref3.png">

</div>

</div>

</body>
</html>
