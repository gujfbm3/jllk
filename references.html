<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Rysa References</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
<style>
https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap
body{
background:url("cute-bg.png") center/cover no-repeat;
font-family:Arial;
text-align:center;
margin:0;
padding:30px;
}

h1{
font-size:65px;
color:#ff4fa3;
text-shadow:2px 2px white;
}

.subtitle{
font-size:22px;
color:#444;
margin-bottom:30px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.card{
background:white;
border:4px solid #ff69b4;
border-radius:25px;
width:300px;
padding:15px;
box-shadow:0 6px 10px rgba(0,0,0,0.15);
}

.card img{
width:100%;
border-radius:15px;
}

.card h2{
font-size:28px;
color:#ff2a8a;
}

.card a{
display:block;
margin-top:10px;
font-size:20px;
color:white;
background:#ff69b4;
padding:8px;
border-radius:10px;
text-decoration:none;
}

.card a:hover{
background:#ff2a8a;
}

</style>
</head>

<body>

<h1>References 🎀</h1>

<p class="subtitle">
الفيديوهات والمصادر التي أستخدمها في الشروحات 💗
</p>

<div class="container">

<div class="card">
<img src="ref1.png">
<h2>شرح تركيب المود</h2>
<a href="ضع رابط الفيديو هنا" target="_blank">🎥 مشاهدة</a>
</div>

<div class="card">
<img src="ref2.png">
<h2>شرح تحميل المود</h2>
<a href="ضع رابط الفيديو هنا" target="_blank">🎥 مشاهدة</a>
</div>

<div class="card">
<img src="ref3.png">
<h2>أدوات المودات</h2>
<a href="ضع رابط الفيديو هنا" target="_blank">🎥 مشاهدة</a>
</div>

</div>

</body>
  <script>
setInterval(()=>{
let heart=document.createElement("div");
heart.innerHTML="💗";
heart.style.position="fixed";
heart.style.left=Math.random()*100+"%";
heart.style.bottom="0";
heart.style.fontSize="30px";
heart.style.animation="float 4s linear";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),4000);
},800);
</script>

<style>
@keyframes float{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-600px);opacity:0;}
}
